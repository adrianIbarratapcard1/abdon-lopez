<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Abdon Lopez</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      min-height:100%;
      background:#07131a;
      overscroll-behavior:none;
    }

    body{
      min-height:100dvh;
      overflow-y:auto;
      overflow-x:hidden;

      font-family:Arial,sans-serif;

      background:
        radial-gradient(circle at top left, rgba(0,255,200,0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,140,255,0.10), transparent 30%),
        linear-gradient(145deg,#07131a,#0b1d27,#112b36);

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px 0;

      position:relative;

      color:white;

      -webkit-overflow-scrolling:touch;
    }

    /* Animated waves */

    .waves{
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:0;
      pointer-events:none;
    }

    .wave{
      position:absolute;
      width:200%;
      height:220px;

      border-radius:45%;

      background:rgba(0,255,200,0.05);

      animation:waveMove 16s linear infinite;
    }

    .wave1{
      bottom:-120px;
      left:-40%;
    }

    .wave2{
      bottom:-150px;
      left:-30%;

      background:rgba(0,140,255,0.05);

      animation-duration:22s;
    }

    @keyframes waveMove{
      from{
        transform:translateX(0) rotate(0deg);
      }

      to{
        transform:translateX(-8%) rotate(360deg);
      }
    }

    /* Floating glass circles */

    .circle{
      position:fixed;
      border-radius:50%;

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(8px);

      z-index:0;

      animation:float 8s ease-in-out infinite alternate;

      pointer-events:none;
    }

    .circle1{
      width:140px;
      height:140px;

      top:12%;
      left:8%;
    }

    .circle2{
      width:90px;
      height:90px;

      top:18%;
      right:12%;

      animation-delay:2s;
    }

    .circle3{
      width:180px;
      height:180px;

      bottom:10%;
      right:10%;

      animation-delay:4s;
    }

    @keyframes float{
      from{
        transform:translateY(0px);
      }

      to{
        transform:translateY(18px);
      }
    }

    /* Main card */

    .card{
      position:relative;
      z-index:2;

      width:92%;
      max-width:430px;

      padding:38px 30px;

      border-radius:34px;

      background:
        linear-gradient(
          145deg,
          rgba(255,255,255,0.08),
          rgba(255,255,255,0.03)
        );

      border:1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(20px);

      box-shadow:
        0 10px 50px rgba(0,0,0,0.45),
        0 0 40px rgba(0,255,200,0.08);

      overflow:hidden;
    }

    /* Animated edge glow */

    .card::before{
      content:"";

      position:absolute;

      inset:-2px;

      border-radius:36px;

      padding:2px;

      background:linear-gradient(
        130deg,
        #00ffd0,
        transparent,
        #0099ff,
        transparent,
        #00ffd0
      );

      background-size:300% 300%;

      animation:borderGlow 8s linear infinite;

      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);

      -webkit-mask-composite:xor;
              mask-composite:exclude;

      pointer-events:none;
    }

    @keyframes borderGlow{
      0%{
        background-position:0% 50%;
      }

      100%{
        background-position:300% 50%;
      }
    }

    /* Profile section */

    .profile-wrapper{
      position:relative;
      width:fit-content;
      margin:auto;
      margin-bottom:28px;
    }

    .profile-ring{
      position:absolute;
      inset:-10px;

      border-radius:50%;

      border:2px solid rgba(0,255,200,0.4);

      animation:pulse 3s ease-in-out infinite;
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
        opacity:0.5;
      }

      50%{
        transform:scale(1.08);
        opacity:1;
      }

      100%{
        transform:scale(1);
        opacity:0.5;
      }
    }

    .profile-pic{
      width:150px;
      height:150px;

      border-radius:50%;
      object-fit:cover;

      border:5px solid #10232c;

      display:block;
    }

    h1{
      text-align:center;

      font-size:38px;

      margin-bottom:10px;

      letter-spacing:1px;

      background:linear-gradient(
        90deg,
        #ffffff,
        #00ffd0
      );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      text-align:center;

      color:#bfd0d8;

      line-height:1.6;

      margin-bottom:36px;

      font-size:15px;
    }

    /* Buttons */

    .links{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .button{
      position:relative;

      overflow:hidden;

      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:18px 20px;

      border-radius:22px;

      text-decoration:none;

      color:white;

      border:1px solid rgba(255,255,255,0.08);

      background:
        linear-gradient(
          145deg,
          rgba(255,255,255,0.05),
          rgba(255,255,255,0.02)
        );

      transition:0.3s ease;

      backdrop-filter:blur(12px);
    }

    .button:hover{
      transform:translateY(-4px) scale(1.01);

      border-color:rgba(0,255,200,0.35);

      box-shadow:
        0 0 22px rgba(0,255,200,0.10);
    }

    /* Sliding highlight */

    .button::before{
      content:"";

      position:absolute;
      inset:0;

      background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.10),
        transparent
      );

      transform:translateX(-100%);

      animation:shine 5s linear infinite;
    }

    @keyframes shine{
      from{
        transform:translateX(-100%);
      }

      to{
        transform:translateX(200%);
      }
    }

    .button-left{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .icon{
      width:55px;
      height:55px;

      border-radius:18px;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:23px;

      flex-shrink:0;

      background:
        linear-gradient(
          145deg,
          #123544,
          #0b1f29
        );

      border:1px solid rgba(0,255,200,0.15);

      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.04);
    }

    .text-group h2{
      font-size:17px;
      margin-bottom:3px;
    }

    .text-group p{
      font-size:13px;
      opacity:0.7;
    }

    .arrow{
      font-size:22px;
      opacity:0.45;
    }

  </style>
</head>

<body>
